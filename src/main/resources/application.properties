# Base: em producao sobrescreva com MS_ACCOUNT_*.
# Local com docker-compose: padroes abaixo batem com a porta 5433 e o banco annotation_app.
# Se rodar pelo terminal sem env, estes defaults sao usados; o launch.json do Cursor tambem define MS_ACCOUNT_*.

spring.application.name=ms-account-service

spring.datasource.url=${MS_ACCOUNT_DATASOURCE_URL:jdbc:postgresql://localhost:5433/annotation_app}
spring.datasource.username=${MS_ACCOUNT_DATASOURCE_USERNAME:annotation_app}
spring.datasource.password=${MS_ACCOUNT_DATASOURCE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${MS_ACCOUNT_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

management.endpoints.web.exposure.include=health
