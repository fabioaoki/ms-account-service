# Base: em producao sobrescreva com MS_ACCOUNT_*.
# Local com docker-compose: padroes abaixo batem com a porta 5433 e o banco annotation_app.
#
# Desenvolvimento sem exportar variáveis a cada run: perfil "local" + ficheiro ignorado pelo git
#   cp config/application-local.properties.example config/application-local.properties
#   (edite a key da OpenAI, etc.). O launch.json do Cursor já define SPRING_PROFILES_ACTIVE=local.
# No terminal, defina uma vez no shell (ex.: ~/.zshrc): export SPRING_PROFILES_ACTIVE=local
# ou use: mvn spring-boot:run -Dspring-boot.run.profiles=local

spring.application.name=ms-account-service

# JWT HS256: secret ≥32 bytes UTF-8, aleatório em produção (ex.: openssl rand -base64 48). iss/aud + access curto + refresh persistido.
app.security.jwt.secret=${MS_ACCOUNT_JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
app.security.jwt.issuer=${MS_ACCOUNT_JWT_ISSUER:ms-account-service}
app.security.jwt.audience=${MS_ACCOUNT_JWT_AUDIENCE:ms-account-api-clients}
app.security.jwt.access-token-expiration-seconds=${MS_ACCOUNT_JWT_ACCESS_EXPIRATION_SECONDS:900}
app.security.jwt.refresh-token-expiration-seconds=${MS_ACCOUNT_JWT_REFRESH_EXPIRATION_SECONDS:604800}

spring.datasource.url=${MS_ACCOUNT_DATASOURCE_URL:jdbc:postgresql://localhost:5433/annotation_app}
spring.datasource.username=${MS_ACCOUNT_DATASOURCE_USERNAME:annotation_app}
spring.datasource.password=${MS_ACCOUNT_DATASOURCE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${MS_ACCOUNT_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

management.endpoints.web.exposure.include=health

# OpenAPI / Swagger UI (rotas também liberadas em SecurityPathConstants)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# OpenAI (consolidação de resumos por tópico). MS_ACCOUNT_* tem prioridade sobre OPENAI_*.
# base-url deve ser o host raiz (ex.: https://api.openai.com), sem /v1 — o cliente usa /v1/chat/completions.
app.openai.enabled=${MS_ACCOUNT_OPENAI_ENABLED:${OPENAI_ENABLED:false}}
app.openai.api-key=${MS_ACCOUNT_OPENAI_API_KEY:${OPENAI_API_KEY:}}
app.openai.model=${MS_ACCOUNT_OPENAI_MODEL:${OPENAI_MODEL:gpt-4o-mini}}
app.openai.base-url=${MS_ACCOUNT_OPENAI_BASE_URL:${OPENAI_BASE_URL:https://api.openai.com}}
# Assistants API (opcional). Se preenchido (ex. asst_...), substitui chat completions; instruções vêm do assistente.
app.openai.assistant-id=${MS_ACCOUNT_OPENAI_ASSISTANT_ID:${OPENAI_ASSISTANT_ID:}}
# Assistente de revisão de qualidade da resposta do assistente principal.
app.openai.assistant-linguage-id=${MS_ACCOUNT_OPENAI_ASSISTANT_LINGUAGE_ID:${OPENAI_ASSISTANT_LINGUAGE_ID:}}
# Assistente OpenAI para colaboração de texto (threads persistem). Compatível com nomes antigos de variável.
app.openai.assistant-text-ai-id=${MS_ACCOUNT_OPENAI_ASSISTANT_TEXT_AI_ID:${OPENAI_ASSISTANT_TEXT_AI_ID:${MS_ACCOUNT_OPENAI_ASSISTANT_MINISTRY_ID:${OPENAI_ASSISTANT_MINISTRY_ID:}}}}
