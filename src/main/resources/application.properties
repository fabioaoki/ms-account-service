# Base: no deploy, sobrescreva com variáveis de ambiente (MS_ACCOUNT_*).
# No Cursor: use a configuração "Docker Postgres" em .vscode/launch.json.

spring.application.name=ms-account-service

spring.datasource.url=${MS_ACCOUNT_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ms_account}
spring.datasource.username=${MS_ACCOUNT_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${MS_ACCOUNT_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${MS_ACCOUNT_DDL_AUTO:update}
spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health
